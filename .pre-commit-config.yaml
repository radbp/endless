default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy runs through uv against the real project environment rather than an
  # isolated env with a hand-copied dependency list. That list would drift out of
  # sync with pyproject.toml on every new dependency; this cannot. Config (strict,
  # file set, per-module overrides) all comes from pyproject.toml — identical to
  # `make type`.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, via uv)
        entry: uv run mypy
        language: system
        pass_filenames: false
        types: [python]

  # Conventional Commits are required (CLAUDE.md §3.4).
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
