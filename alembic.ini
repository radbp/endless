# Alembic configuration. The database URL is NOT set here — env.py reads it from
# application settings (ENDLESS_DATABASE_URL), so there is one source of truth and
# no connection string committed to the repo (CLAUDE.md §1.3).
[alembic]
script_location = app/db/migrations
prepend_sys_path = .
path_separator = os
# Timezone-aware, sortable revision filenames.
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
