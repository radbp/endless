# Local development dependencies only. These credentials are throwaway values
# for containers that never leave this machine — deployed environments take
# theirs from Key Vault (CLAUDE.md §1.3).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: endless
      POSTGRES_PASSWORD: endless
      POSTGRES_DB: endless
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U endless -d endless"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
